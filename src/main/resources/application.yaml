server:
  shutdown: graceful
  port: 8000
  ssl:
    enabled: false

oauth:
  google:
    client-id: 985212099499-uel8drlne8o4et7e3u1gbnjjvdi0k11l.apps.googleusercontent.com
    client-secret: ${GOOGLE_CLIENT_SECRET:change-me}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3000/auth/google/callback}
    authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
    token-uri: https://oauth2.googleapis.com/token
    scope: openid email profile
    authorization-state-ttl-seconds: 600

spring:
  application:
    name: art-market-place
  data:
    redis:
      host: localhost
      port: 9379
      password: root!23
  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        highlight_sql: true
        auto_quote_keyword: true
        hbm2ddl:
          auto: none

  datasource:
    url: jdbc:postgresql://localhost:9433/credential
    username: root
    password: 123456789
    driver-class-name: org.postgresql.Driver
    type: org.apache.commons.dbcp2.BasicDataSource
    dbcp2:
      initial-size: 5
      max-total: 30
      max-idle: 15
      min-idle: 5
      max-wait-millis: 10000
      validation-query: SELECT 1
      test-on-borrow: true
      test-while-idle: true
      time-between-eviction-runs-millis: 5000
      min-evictable-idle-time-millis: 60000

logging:
  level:
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.transaction.interceptor: trace
  file:
    name: logs/art-market-place.log
